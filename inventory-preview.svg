<svg width="400" height="260" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeUp {
        0% { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
      @keyframes scan {
        0% { transform: translateY(0); opacity: 0.8; }
        50% { transform: translateY(100px); opacity: 0.4; }
        100% { transform: translateY(0); opacity: 0.8; }
      }
      @keyframes stockPulse {
        0%,100% { fill: #dc2626; }
        50% { fill: #ef4444; }
      }
      @keyframes counterUp {
        0% { opacity: 0; } 100% { opacity: 1; }
      }
      .r1 { animation: fadeUp 0.4s ease 0.1s both; }
      .r2 { animation: fadeUp 0.4s ease 0.3s both; }
      .r3 { animation: fadeUp 0.4s ease 0.5s both; }
      .r4 { animation: fadeUp 0.4s ease 0.7s both; }
      .r5 { animation: fadeUp 0.4s ease 0.9s both; }
      .scanner { animation: scan 3s ease-in-out 1s infinite; }
      .lowstock { animation: stockPulse 1.5s ease-in-out infinite; }
      .cursor { animation: blink 1s step-end infinite; }
    </style>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f0a"/>
      <stop offset="100%" stop-color="#0f1a10"/>
    </linearGradient>
    <linearGradient id="headerG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>

  <rect width="400" height="260" rx="12" fill="url(#bg3)"/>
  <rect width="400" height="260" rx="12" fill="none" stroke="#16a34a" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="400" height="36" rx="12" fill="#0a1a0c"/>
  <rect x="0" y="24" width="400" height="12" fill="#0a1a0c"/>
  <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="18" r="5" fill="#febc2e"/>
  <circle cx="50" cy="18" r="5" fill="#28c840"/>
  <text x="200" y="23" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle" opacity="0.8">Inventory Manager — Dashboard</text>

  <!-- Stat cards -->
  <g class="r1">
    <rect x="12" y="48" width="86" height="52" rx="8" fill="#0a1a0c" stroke="#16a34a" stroke-width="0.5" stroke-opacity="0.6"/>
    <text x="55" y="66" font-family="monospace" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">248</text>
    <text x="55" y="79" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Total Items</text>
    <text x="55" y="92" font-family="monospace" font-size="7" fill="#4ade80" text-anchor="middle">↑ 12 added</text>
  </g>
  <g class="r2">
    <rect x="108" y="48" width="86" height="52" rx="8" fill="#1c0a0a" stroke="#dc2626" stroke-width="0.5" stroke-opacity="0.6"/>
    <text x="151" y="66" font-family="monospace" font-size="17" text-anchor="middle" font-weight="bold" class="lowstock">7</text>
    <text x="151" y="79" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Low Stock</text>
    <text x="151" y="92" font-family="monospace" font-size="7" fill="#ef4444" text-anchor="middle">⚠ reorder</text>
  </g>
  <g class="r3">
    <rect x="204" y="48" width="86" height="52" rx="8" fill="#0c1628" stroke="#2563eb" stroke-width="0.5" stroke-opacity="0.6"/>
    <text x="247" y="66" font-family="monospace" font-size="17" fill="#60a5fa" text-anchor="middle" font-weight="bold">14</text>
    <text x="247" y="79" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Categories</text>
    <text x="247" y="92" font-family="monospace" font-size="7" fill="#60a5fa" text-anchor="middle">organized</text>
  </g>
  <g class="r4">
    <rect x="300" y="48" width="88" height="52" rx="8" fill="#1a0a2e" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.6"/>
    <text x="344" y="66" font-family="monospace" font-size="17" fill="#a78bfa" text-anchor="middle" font-weight="bold">2</text>
    <text x="344" y="79" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Roles</text>
    <text x="344" y="92" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">admin/staff</text>
  </g>

  <!-- Table header -->
  <g class="r1">
    <rect x="12" y="112" width="376" height="22" rx="4" fill="#14532d" opacity="0.7"/>
    <text x="24" y="126" font-family="monospace" font-size="8" fill="#bbf7d0">PRODUCT</text>
    <text x="160" y="126" font-family="monospace" font-size="8" fill="#bbf7d0">CATEGORY</text>
    <text x="240" y="126" font-family="monospace" font-size="8" fill="#bbf7d0">STOCK</text>
    <text x="300" y="126" font-family="monospace" font-size="8" fill="#bbf7d0">STATUS</text>
    <text x="355" y="126" font-family="monospace" font-size="8" fill="#bbf7d0">ACTION</text>
  </g>

  <!-- Row 1 -->
  <g class="r2">
    <rect x="12" y="136" width="376" height="20" rx="3" fill="#0d1a0e"/>
    <text x="24" y="149" font-family="monospace" font-size="8" fill="#e2e8f0">MacBook Pro 14"</text>
    <text x="160" y="149" font-family="monospace" font-size="8" fill="#94a3b8">Electronics</text>
    <text x="240" y="149" font-family="monospace" font-size="8" fill="#e2e8f0">34</text>
    <rect x="295" y="140" width="42" height="12" rx="3" fill="#14532d"/>
    <text x="316" y="149" font-family="monospace" font-size="7" fill="#4ade80" text-anchor="middle">In Stock</text>
    <text x="368" y="149" font-family="monospace" font-size="9" fill="#60a5fa">✎</text>
  </g>

  <!-- Row 2 -->
  <g class="r3">
    <rect x="12" y="158" width="376" height="20" rx="3" fill="#0a0f0a"/>
    <text x="24" y="171" font-family="monospace" font-size="8" fill="#e2e8f0">USB-C Cables</text>
    <text x="160" y="171" font-family="monospace" font-size="8" fill="#94a3b8">Accessories</text>
    <text x="240" y="171" font-family="monospace" font-size="8" fill="#fbbf24">3</text>
    <rect x="295" y="162" width="42" height="12" rx="3" fill="#7c1d1d"/>
    <text x="316" y="171" font-family="monospace" font-size="7" fill="#fca5a5" text-anchor="middle">Low Stock</text>
    <text x="368" y="171" font-family="monospace" font-size="9" fill="#60a5fa">✎</text>
  </g>

  <!-- Row 3 -->
  <g class="r4">
    <rect x="12" y="180" width="376" height="20" rx="3" fill="#0d1a0e"/>
    <text x="24" y="193" font-family="monospace" font-size="8" fill="#e2e8f0">Wireless Mouse</text>
    <text x="160" y="193" font-family="monospace" font-size="8" fill="#94a3b8">Peripherals</text>
    <text x="240" y="193" font-family="monospace" font-size="8" fill="#e2e8f0">19</text>
    <rect x="295" y="184" width="42" height="12" rx="3" fill="#14532d"/>
    <text x="316" y="193" font-family="monospace" font-size="7" fill="#4ade80" text-anchor="middle">In Stock</text>
    <text x="368" y="193" font-family="monospace" font-size="9" fill="#60a5fa">✎</text>
  </g>

  <!-- Search bar -->
  <g class="r5">
    <rect x="12" y="210" width="220" height="26" rx="6" fill="#0a1a0c" stroke="#16a34a" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="24" y="227" font-family="monospace" font-size="8" fill="#475569">🔍 Search inventory<tspan class="cursor" fill="#4ade80">|</tspan></text>
    <rect x="244" y="210" width="70" height="26" rx="6" fill="#14532d" opacity="0.8"/>
    <text x="279" y="227" font-family="monospace" font-size="8" fill="#bbf7d0" text-anchor="middle">+ Add Item</text>
    <rect x="326" y="210" width="62" height="26" rx="6" fill="#1c1003" opacity="0.8"/>
    <text x="357" y="227" font-family="monospace" font-size="8" fill="#fbbf24" text-anchor="middle">📊 Export</text>
  </g>
</svg>
