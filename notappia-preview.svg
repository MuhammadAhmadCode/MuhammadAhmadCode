<svg width="400" height="260" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeSlideIn {
        0% { opacity: 0; transform: translateY(12px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.7; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.04); }
      }
      @keyframes slideIn {
        0% { width: 0; }
        100% { width: 180px; }
      }
      @keyframes slideIn2 {
        0% { width: 0; }
        100% { width: 120px; }
      }
      @keyframes slideIn3 {
        0% { width: 0; }
        100% { width: 150px; }
      }
      @keyframes lockBounce {
        0%, 100% { transform: translateY(0); }
        40% { transform: translateY(-4px); }
        60% { transform: translateY(-2px); }
      }
      .row1 { animation: fadeSlideIn 0.5s ease 0.2s both; }
      .row2 { animation: fadeSlideIn 0.5s ease 0.5s both; }
      .row3 { animation: fadeSlideIn 0.5s ease 0.8s both; }
      .row4 { animation: fadeSlideIn 0.5s ease 1.1s both; }
      .row5 { animation: fadeSlideIn 0.5s ease 1.4s both; }
      .bar1 { animation: slideIn 0.8s ease 0.4s both; }
      .bar2 { animation: slideIn2 0.8s ease 0.7s both; }
      .bar3 { animation: slideIn3 0.8s ease 1.0s both; }
      .lock { animation: lockBounce 2s ease-in-out 1.5s infinite; }
      .cursor { animation: blink 1s step-end infinite; }
      .badge { animation: pulse 2s ease-in-out infinite; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" rx="12" fill="url(#bg)"/>
  <rect width="400" height="260" rx="12" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="400" height="36" rx="12" fill="#1e1132"/>
  <rect x="0" y="24" width="400" height="12" fill="#1e1132"/>
  <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="18" r="5" fill="#febc2e"/>
  <circle cx="50" cy="18" r="5" fill="#28c840"/>
  <text x="200" y="23" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle" opacity="0.8">NotAppia — Notes App</text>

  <!-- Sidebar -->
  <rect x="12" y="48" width="90" height="200" rx="8" fill="#160d2a" opacity="0.8"/>
  <text x="57" y="68" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle" opacity="0.7">MENU</text>
  <rect x="20" y="74" width="74" height="1" fill="#7c3aed" opacity="0.3"/>

  <g class="row1">
    <rect x="20" y="82" width="74" height="22" rx="4" fill="#7c3aed" opacity="0.8"/>
    <text x="57" y="97" font-family="monospace" font-size="9" fill="white" text-anchor="middle">📝 My Notes</text>
  </g>
  <g class="row2">
    <rect x="20" y="110" width="74" height="22" rx="4" fill="none"/>
    <text x="57" y="125" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle" opacity="0.7">⭐ Starred</text>
  </g>
  <g class="row3">
    <rect x="20" y="138" width="74" height="22" rx="4" fill="none"/>
    <text x="57" y="153" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle" opacity="0.7">🗑️ Trash</text>
  </g>

  <!-- Lock badge -->
  <g class="lock">
    <rect x="22" y="210" width="70" height="26" rx="5" fill="#14532d" opacity="0.9"/>
    <text x="57" y="227" font-family="monospace" font-size="9" fill="#4ade80" text-anchor="middle">🔐 JWT Auth</text>
  </g>

  <!-- Main content area -->
  <rect x="114" y="48" width="274" height="200" rx="8" fill="#0f0a1e" opacity="0.6"/>

  <!-- Note cards -->
  <g class="row1">
    <rect x="122" y="56" width="258" height="52" rx="6" fill="#1e1132" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="135" y="72" font-family="monospace" font-size="9" fill="#a78bfa">📄 Meeting Notes</text>
    <text x="135" y="86" font-family="monospace" font-size="8" fill="#64748b">Discussed project timeline and milestones...</text>
    <rect x="330" y="64" width="38" height="14" rx="3" fill="#7c3aed" opacity="0.4"/>
    <text x="349" y="74" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">Work</text>
  </g>

  <g class="row2">
    <rect x="122" y="116" width="258" height="52" rx="6" fill="#1e1132" stroke="#6d28d9" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="135" y="132" font-family="monospace" font-size="9" fill="#a78bfa">📄 React Hooks</text>
    <text x="135" y="146" font-family="monospace" font-size="8" fill="#64748b">useState, useEffect, useContext notes...</text>
    <rect x="330" y="124" width="38" height="14" rx="3" fill="#1e40af" opacity="0.4"/>
    <text x="349" y="134" font-family="monospace" font-size="7" fill="#93c5fd" text-anchor="middle">Code</text>
  </g>

  <g class="row3">
    <rect x="122" y="176" width="258" height="52" rx="6" fill="#1e1132" stroke="#5b21b6" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="135" y="192" font-family="monospace" font-size="9" fill="#a78bfa">📄 New Note</text>
    <text x="135" y="206" font-family="monospace" font-size="8" fill="#475569">Start typing here<tspan class="cursor" fill="#a78bfa">|</tspan></text>
    <rect x="330" y="184" width="38" height="14" rx="3" fill="#065f46" opacity="0.4"/>
    <text x="349" y="194" font-family="monospace" font-size="7" fill="#6ee7b7" text-anchor="middle">Draft</text>
  </g>
</svg>
