<svg width="400" height="260" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes fadeUp {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes grow {
        0% { height: 0; y: 195; }
        100% { }
      }
      @keyframes checkPop {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes barFill1 { 0% { width: 0; } 100% { width: 110px; } }
      @keyframes barFill2 { 0% { width: 0; } 100% { width: 75px; } }
      @keyframes barFill3 { 0% { width: 0; } 100% { width: 90px; } }
      @keyframes pulse { 0%,100%{opacity:0.8;} 50%{opacity:1;} }
      @keyframes tickMove { 0%,100%{transform:translateX(0);} 50%{transform:translateX(2px);} }

      .c1 { animation: fadeUp 0.4s ease 0.1s both; }
      .c2 { animation: fadeUp 0.4s ease 0.3s both; }
      .c3 { animation: fadeUp 0.4s ease 0.5s both; }
      .c4 { animation: fadeUp 0.4s ease 0.7s both; }
      .bf1 { animation: barFill1 1s ease 0.4s both; }
      .bf2 { animation: barFill2 1s ease 0.7s both; }
      .bf3 { animation: barFill3 1s ease 1.0s both; }
      .ck1 { animation: checkPop 0.4s ease 0.9s both; }
      .ck2 { animation: checkPop 0.4s ease 1.1s both; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="bar1g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar2g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="bar3g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <rect width="400" height="260" rx="12" fill="url(#bg2)"/>
  <rect width="400" height="260" rx="12" fill="none" stroke="#2563eb" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="400" height="36" rx="12" fill="#0c1628"/>
  <rect x="0" y="24" width="400" height="12" fill="#0c1628"/>
  <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="34" cy="18" r="5" fill="#febc2e"/>
  <circle cx="50" cy="18" r="5" fill="#28c840"/>
  <text x="200" y="23" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle" opacity="0.8">EduZap — Student Dashboard</text>

  <!-- Stats row -->
  <g class="c1">
    <rect x="12" y="48" width="86" height="56" rx="8" fill="#0f1e3a" stroke="#2563eb" stroke-width="0.5" stroke-opacity="0.6"/>
    <text x="55" y="66" font-family="monospace" font-size="18" fill="#60a5fa" text-anchor="middle" font-weight="bold">8</text>
    <text x="55" y="80" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Tasks Today</text>
    <text x="55" y="96" font-family="monospace" font-size="7" fill="#22c55e" text-anchor="middle">↑ 3 done</text>
  </g>
  <g class="c2">
    <rect x="108" y="48" width="86" height="56" rx="8" fill="#1a0a2e" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.6"/>
    <text x="151" y="66" font-family="monospace" font-size="18" fill="#a78bfa" text-anchor="middle" font-weight="bold">5</text>
    <text x="151" y="80" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Notes</text>
    <text x="151" y="96" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="middle">2 new today</text>
  </g>
  <g class="c3">
    <rect x="204" y="48" width="86" height="56" rx="8" fill="#0a1f1e" stroke="#0d9488" stroke-width="0.5" stroke-opacity="0.6"/>
    <text x="247" y="66" font-family="monospace" font-size="18" fill="#2dd4bf" text-anchor="middle" font-weight="bold">72%</text>
    <text x="247" y="80" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Progress</text>
    <text x="247" y="96" font-family="monospace" font-size="7" fill="#2dd4bf" text-anchor="middle">This week</text>
  </g>
  <g class="c4 pulse">
    <rect x="300" y="48" width="88" height="56" rx="8" fill="#1c1003" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.6"/>
    <text x="344" y="66" font-family="monospace" font-size="18" fill="#fbbf24" text-anchor="middle" font-weight="bold">3</text>
    <text x="344" y="80" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Due Soon</text>
    <text x="344" y="96" font-family="monospace" font-size="7" fill="#f59e0b" text-anchor="middle">⚠ urgent</text>
  </g>

  <!-- Progress bars section -->
  <g class="c1">
    <text x="14" y="124" font-family="monospace" font-size="9" fill="#94a3b8">Subject Progress</text>
  </g>

  <!-- Math -->
  <g class="c2">
    <text x="14" y="142" font-family="monospace" font-size="8" fill="#60a5fa">Mathematics</text>
    <rect x="14" y="146" width="180" height="7" rx="3" fill="#0f1e3a"/>
    <rect x="14" y="146" height="7" rx="3" fill="url(#bar1g)" class="bf1"/>
    <text x="200" y="154" font-family="monospace" font-size="8" fill="#60a5fa">61%</text>
  </g>

  <!-- CS -->
  <g class="c3">
    <text x="14" y="168" font-family="monospace" font-size="8" fill="#a78bfa">Computer Science</text>
    <rect x="14" y="172" width="180" height="7" rx="3" fill="#1a0a2e"/>
    <rect x="14" y="172" height="7" rx="3" fill="url(#bar2g)" class="bf2"/>
    <text x="200" y="180" font-family="monospace" font-size="8" fill="#a78bfa">42%</text>
  </g>

  <!-- Physics -->
  <g class="c4">
    <text x="14" y="194" font-family="monospace" font-size="8" fill="#2dd4bf">Physics</text>
    <rect x="14" y="198" width="180" height="7" rx="3" fill="#0a1f1e"/>
    <rect x="14" y="198" height="7" rx="3" fill="url(#bar3g)" class="bf3"/>
    <text x="200" y="206" font-family="monospace" font-size="8" fill="#2dd4bf">50%</text>
  </g>

  <!-- Task list -->
  <g class="c1">
    <text x="230" y="124" font-family="monospace" font-size="9" fill="#94a3b8">Today's Tasks</text>
  </g>
  <g class="c2">
    <rect x="230" y="130" width="158" height="20" rx="4" fill="#0f1e3a"/>
    <g class="ck1"><text x="243" y="144" font-family="monospace" font-size="10" fill="#22c55e">✓</text></g>
    <text x="258" y="144" font-family="monospace" font-size="8" fill="#64748b" text-decoration="line-through">Read Chapter 4</text>
  </g>
  <g class="c3">
    <rect x="230" y="155" width="158" height="20" rx="4" fill="#0f1e3a"/>
    <g class="ck2"><text x="243" y="169" font-family="monospace" font-size="10" fill="#22c55e">✓</text></g>
    <text x="258" y="169" font-family="monospace" font-size="8" fill="#64748b" text-decoration="line-through">Math exercises</text>
  </g>
  <g class="c4">
    <rect x="230" y="180" width="158" height="20" rx="4" fill="#1a0a2e"/>
    <rect x="237" y="186" width="9" height="9" rx="2" fill="none" stroke="#a78bfa" stroke-width="1"/>
    <text x="255" y="194" font-family="monospace" font-size="8" fill="#e2e8f0">Write lab report</text>
  </g>

  <!-- Bottom bar -->
  <rect x="12" y="218" width="376" height="30" rx="6" fill="#0c1628" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="200" y="237" font-family="monospace" font-size="8" fill="#475569" text-anchor="middle">React + Tailwind CSS · Context API · Node.js + Express · MongoDB</text>
</svg>
